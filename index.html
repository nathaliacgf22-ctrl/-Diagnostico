<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Legado Visagista | Diagnóstico de Alta Precisão</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { background: #050505; color: #fff; font-family: 'Montserrat', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        
        /* LOGO NATIVA */
        .logo-box { text-align: center; margin-bottom: 50px; }
        .logo-icone { font-size: 80px; color: #D4AF37; }
        .logo-titulo { font-family: 'Playfair Display', serif; font-size: 35px; color: #D4AF37; letter-spacing: 6px; text-transform: uppercase; }

        .painel { background: #0a0a0a; border: 1px solid #222; padding: 40px; border-radius: 8px; width: 100%; max-width: 600px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; background: none; border: none; border-bottom: 1px solid #333; color: #fff; padding: 12px 0; font-size: 16px; }
        button { width: 100%; padding: 18px; background: #D4AF37; border: none; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; font-weight: bold; margin-top: 30px; transition: 0.3s; }
        button:hover { background: #b5952f; }
        
        /* DOSSIÊ ESTILO PDF */
        .resultado-bloco { margin-bottom: 25px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .resultado-bloco h4 { color: #D4AF37; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; }
        .resultado-bloco p { font-size: 15px; line-height: 1.6; color: #ccc; }
        
        #pdf-btn { background: #fff; color: #000; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="logo-box">
        <div class="logo-icone">⚜️</div>
        <h1 class="logo-titulo">Legado Visagista</h1>
    </div>

    <div id="app" class="painel">
        <input type="text" id="nome" placeholder="Identificação da Cliente">
        <input type="file" id="foto" accept="image/*" style="margin-top:20px;">
        <button id="btn">Iniciar Diagnóstico Clínico</button>

        <div id="resultado" style="display:none; margin-top:40px;">
            <div id="areaPdf">
                <h2 style="text-align:center; color:#D4AF37; font-family:'Playfair Display'; margin-bottom:30px;">Dossiê de Análise</h2>
                <div class="resultado-bloco"><h4>Proporções Anatômicas</h4><p id="t1"></p></div>
                <div class="resultado-bloco"><h4>Análise Geométrica</h4><p id="t2"></p></div>
                <div class="resultado-bloco"><h4>Formato do Rosto</h4><p id="t3"></p></div>
                <div class="resultado-bloco"><h4>Lei da Compensação</h4><p id="t4"></p></div>
                <div class="resultado-bloco"><h4>Engenharia de Corte & Cor</h4><p id="t5"></p></div>
            </div>
            <button id="pdf-btn">Exportar Dossiê (PDF)</button>
        </div>
    </div>

    <script>
    document.getElementById('btn').onclick = async () => {
        const btn = document.getElementById('btn');
        btn.innerText = "Calculando Proporções...";
        const file = document.getElementById('foto').files[0];
        const reader = new FileReader();
        reader.onload = async (e) => {
            const res = await fetch('https://diagnostico-p10h.onrender.com/api/diagnostico', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer sararamos123' },
                body: JSON.stringify({ imagemBase64: e.target.result.split(',')[1], mimeType: file.type })
            });
            const data = await res.json();
            const d = data.diagnostico;
            document.getElementById('t1').innerText = d.analise_tercos;
            document.getElementById('t2').innerText = d.geometria_linhas;
            document.getElementById('t3').innerText = d.formato_final;
            document.getElementById('t4').innerText = d.lei_compensacao;
            document.getElementById('t5').innerText = d.engenharia_corte_cor;
            document.getElementById('resultado').style.display = 'block';
            btn.innerText = "Iniciar Diagnóstico Clínico";
        };
        reader.readAsDataURL(file);
    };

    document.getElementById('pdf-btn').onclick = () => {
        html2pdf().set({filename: 'Dossie_Visagista.pdf'}).from(document.getElementById('areaPdf')).save();
    };
    </script>
</body>
</html>
